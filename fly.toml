# fly.toml - Fly.io configuration for JabStack
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# IMPORTANT: Before deploying, update the following:
#   1. app - Your Fly.io app name
#   2. PUBLIC_APP_URL - Your production URL

app = 'jabstack'
primary_region = 'iad'

[build]

# IMPORTANT: Update PUBLIC_APP_URL to your production URL before deploying
[build.args]
  PUBLIC_APP_URL = "https://jabstack.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512

[env]
  NODE_ENV = 'production'
